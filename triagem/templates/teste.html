<div class="form-group">
            <label for="{{ form.password.id_for_label }}">Senha</label>
            
            <div class="password-wrapper">
                {{ form.password }}
                <span class="toggle-password" onclick="togglePasswordVisibility('{{ form.password.id_for_label }}', this)">
                    <i class="far fa-eye"></i>
                </span>
            </div>
            
            {% if form.password.errors %}<div class="error-text">{{ form.password.errors.as_text }}</div>{% endif %}
        </div>
